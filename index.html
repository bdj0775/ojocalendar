<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- iOS PWA: 홈화면 추가 시 Safari 주소창 숨김 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OZO Calendar" />
    <title>OZO Calendar</title>

    <!-- Open Graph (카카오톡, 슬랙 등 링크 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ojocalendar.vercel.app/" />
    <meta property="og:title" content="OZO Calendar" />
    <meta property="og:description" content="숙소 예약을 한눈에 — 스마트한 숙소 관리 캘린더" />
    <meta property="og:image" content="https://ojocalendar.vercel.app/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OZO Calendar" />
    <meta name="twitter:description" content="숙소 예약을 한눈에 — 스마트한 숙소 관리 캘린더" />
    <meta name="twitter:image" content="https://ojocalendar.vercel.app/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
